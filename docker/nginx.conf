user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # gzip  on; # 필요시 주석 해제하여 사용

    server {
        listen       80;
        server_name  localhost;

        # [중요] 빌드된 정적 파일(React/Vue 등)이 위치한 경로
        # Docker 공식 Nginx 이미지의 기본 경로는 /usr/share/nginx/html 입니다.
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # 1. API 요청을 가장 먼저 처리 (정적 파일 요청과 분리)
        # 운영: /admin/main-dev → 백엔드 /main-dev로 전달
        location ^~ /admin/main-dev/ {
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-ADMIN" always;
        }

        # 개발: /admin-dev/main-dev → 백엔드 /main-dev로 전달
        location ^~ /admin-dev/main-dev/ {
            rewrite ^/admin-dev/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-ADMIN-DEV" always;
        }

        # (호환) 직접 /main-dev 호출도 허용
        location ^~ /main-dev/ {
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-ROOT" always;
        }

        # /admin/assets 등 실제 파일이 존재하는 경우 처리
        location /admin/assets/ {
            access_log off;
        }

        # /admin-dev/assets 등 실제 파일이 존재하는 경우 처리
        location ^~ /admin-dev/assets/ {
            alias /usr/share/nginx/html/assets/;
            access_log off;
            add_header X-Matched-By "STATIC-ADMIN-DEV-ASSETS" always;
        }

        # 2. /admin 컨텍스트 처리 (SPA 라우팅 핵심)
        location /admin {
            # alias 대신 root와 폴더 구조를 사용하여 try_files 경로 충돌 방지
            # index.html 파일이 /usr/share/nginx/html/index.html 에 있다고 가정
            try_files $uri $uri/ /index.html;
            add_header X-Matched-By "STATIC-ADMIN-FALLBACK" always;
        }

        # 2-1. /admin-dev 컨텍스트 처리 (개발용 SPA 라우팅)
        location ^~ /admin-dev {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
            add_header X-Matched-By "STATIC-ADMIN-DEV-FALLBACK" always;
        }

        # 3. 루트 및 기타 정적 파일 처리
        location / {
            try_files $uri $uri/ /index.html;
        }

        # [추가] 정적 리소스(favicon 등)가 루트에 있을 경우를 대비한 예외 처리 (선택)
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # 500 에러 처리 (선택 사항)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
