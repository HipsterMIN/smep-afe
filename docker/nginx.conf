user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # gzip  on; # 필요시 주석 해제하여 사용

    server {
        listen       80;
        server_name  localhost;

        # [중요] 빌드된 정적 파일(React/Vue 등)이 위치한 경로
        # Docker 공식 Nginx 이미지의 기본 경로는 /usr/share/nginx/html 입니다.
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # 1. API 요청을 가장 먼저 처리 (정적 파일 요청과 분리)
        # 운영: /home-admin/api → 백엔드 /api로 전달
        location ^~ /home-admin/api/ {
            rewrite ^/home-admin/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-HOME-ADMIN" always;
        }

        # 개발: /home-admin-dev/api → 백엔드 /api로 전달
        location ^~ /home-admin-dev/api/ {
            rewrite ^/home-admin-dev/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-HOME-ADMIN-DEV" always;
        }

        # Actuator 및 기타 공통 엔드포인트 지원
        location ^~ /home-admin/actuator/ {
            rewrite ^/home-admin/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            add_header X-Matched-By "API-PROXY-ACTUATOR" always;
        }
        location ^~ /home-admin-dev/actuator/ {
            rewrite ^/home-admin-dev/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
            add_header X-Matched-By "API-PROXY-ACTUATOR-DEV" always;
        }

        # 테스트용 example 엔드포인트 지원
        location ^~ /home-admin/example {
            rewrite ^/home-admin/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
        }
        location ^~ /home-admin-dev/example {
            rewrite ^/home-admin-dev/(.*)$ /$1 break;
            proxy_pass http://smep-admin-dev.smepbe:8080;
        }

        # (호환) 직접 /api 호출도 허용
        location ^~ /api/ {
            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            add_header X-Matched-By "API-PROXY-ROOT" always;
        }

        # /home-admin/assets 정적 자원 처리
        location ^~ /home-admin/assets/ {
            alias /usr/share/nginx/html/assets/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header X-Matched-By "STATIC-HOME-ADMIN-ASSETS" always;
        }

        # /home-admin-dev/assets 정적 자원 처리
        location ^~ /home-admin-dev/assets/ {
            alias /usr/share/nginx/html/assets/;
            access_log off;
            add_header X-Matched-By "STATIC-HOME-ADMIN-DEV-ASSETS" always;
        }

        # 2. /home-admin 컨텍스트 처리 (SPA 라우팅 핵심 — 운영)
        location ^~ /home-admin/ {
            root /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /home-admin/index.html;
            add_header Cache-Control "no-store" always;
            add_header X-Matched-By "STATIC-HOME-ADMIN-FALLBACK" always;
        }

        # 2-1. /home-admin-dev 컨텍스트 처리 (개발용 SPA 라우팅)
        location ^~ /home-admin-dev {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
            add_header X-Matched-By "STATIC-HOME-ADMIN-DEV-FALLBACK" always;
        }

        # 3. 루트 및 기타 정적 파일 처리
        location / {
            try_files $uri $uri/ /index.html;
        }

        # [추가] 정적 리소스(favicon 등)가 루트에 있을 경우를 대비한 예외 처리 (선택)
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # 500 에러 처리 (선택 사항)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
