user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # gzip  on; # 필요시 주석 해제하여 사용

    server {
        listen       80;
        server_name  localhost;

        # [중요] 빌드된 정적 파일(React/Vue 등)이 위치한 경로
        # Docker 공식 Nginx 이미지의 기본 경로는 /usr/share/nginx/html 입니다.
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # 1. API 요청을 가장 먼저 처리 (정적 파일 요청과 분리)
        location /admin/main-dev {
            # /admin 부분을 제거하고 백엔드에 전달 (예: /admin/main-dev -> /main-dev)
            rewrite ^/admin/(.*)$ /$1 break;

            proxy_pass http://smep-admin-dev.smepbe:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # HTML이 아닌 JSON 응답임을 보장하기 위해 설정 (선택)
            proxy_hide_header Content-Type;
            add_header Content-Type application/json;
        }

        # 2. /admin 컨텍스트 처리 (SPA 라우팅 핵심)
        location /admin {
            alias /usr/share/nginx/html;
            # 파일이 있으면 그대로 서빙, 없으면 index.html로 리다이렉트
            try_files $uri $uri/ /admin/index.html;
        }

        # 3. 루트 및 기타 정적 파일 처리
        location / {
            try_files $uri $uri/ /index.html;
        }

        # [추가] 정적 리소스(favicon 등)가 루트에 있을 경우를 대비한 예외 처리 (선택)
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # 500 에러 처리 (선택 사항)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
